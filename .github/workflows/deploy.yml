name: Deploy

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2.2'
    # rmagick (via jekyll-responsive-image) builds a native extension against
    # ImageMagick, which ubuntu-latest runners no longer ship. Install the dev
    # headers so `bundle install` can compile it.
    - name: Install ImageMagick (rmagick native dep)
      run: sudo apt-get update && sudo apt-get install -y libmagickwand-dev
    - name: Install deps
      run: |
        gem install bundler
        bundle install --jobs 4 --retry 3
        npm install -g @mermaid-js/mermaid-cli
    - name: Setup deploy options
      id: setup
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        if [[ ${GITHUB_REF} = refs/pull/*/merge ]]; then # pull request
          echo "SRC_BRANCH=${GITHUB_HEAD_REF}" >> "$GITHUB_OUTPUT"
          echo "NO_PUSH=--no-push" >> "$GITHUB_OUTPUT"
        elif [[ ${GITHUB_REF} = refs/heads/* ]]; then # branch, e.g. master, source etc
          echo "SRC_BRANCH=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
        fi
        echo "DEPLOY_BRANCH=gh-pages" >> "$GITHUB_OUTPUT"
    - name: Deploy website
      run: yes | bin/deploy --verbose ${{ steps.setup.outputs.NO_PUSH }} --src ${{ steps.setup.outputs.SRC_BRANCH }} --deploy ${{ steps.setup.outputs.DEPLOY_BRANCH }}
